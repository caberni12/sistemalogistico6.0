<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ======================================================
   BASE
====================================================== */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:#f4f7fb;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}

/* ======================================================
   CONTROLES
====================================================== */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.controls input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  width:260px;
  max-width:100%;
}

button{
  border:none;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  font-size:14px;
}

.btn-primary{ background:#3b82f6; color:#fff; }
.btn-success{ background:#10b981; color:#fff; }
.btn-edit{ background:#6366f1; color:#fff; padding:6px 12px; }
.btn-danger{ background:#ef4444; color:#fff; padding:6px 12px; }

/* ======================================================
   LOADER
====================================================== */
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,.4);
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg) }
}

.loading{
  pointer-events:none;
  opacity:.8;
  display:flex;
  align-items:center;
  gap:8px;
  justify-content:center;
}

/* ======================================================
   TABLA WEB
====================================================== */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f1f5f9;
  padding:12px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:13px;
  text-align:center;
}

/* ======================================================
   MODALES (GENERAL)
====================================================== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-content{
  background:#fff;
  width:520px;
  max-width:92%;
  max-height:90vh;
  overflow:auto;
  padding:20px;
  border-radius:16px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.permissions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.footer-btns{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.footer-btns button{
  flex:1;
}

/* ======================================================
   MOBILE GENERAL
====================================================== */
.mobile-list{
  display:none;
}

@media(max-width:768px){

  /* Oculta tabla principal */
  .card > table,
  .card > table thead{
    display:none;
  }

  .controls input{
    width:100%;
  }

  .mobile-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .mobile-card{
    background:#fff;
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    border:1px solid #e5e7eb;
  }

  .mobile-card h4{
    margin:0 0 6px;
    font-size:15px;
  }

  .mobile-card p{
    margin:4px 0;
    font-size:13px;
    color:#475569;
  }

  .mobile-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
  }

  .mobile-actions button{
    flex:1;
  }
}

/* ======================================================
   MODAL MÓDULOS – ESTILO FINAL MÓVIL
====================================================== */
@media (max-width:768px){

  #modalListaModulos{
    align-items:flex-end;
  }

  #modalListaModulos .modal-content{
    width:100%;
    max-height:92dvh;
    border-radius:22px 22px 0 0;
    padding:18px 16px 22px;
    animation:slideUp .3s ease;
  }

  @keyframes slideUp{
    from{ transform:translateY(40px); opacity:0 }
    to{ transform:translateY(0); opacity:1 }
  }

  /* Oculta tabla SOLO en modal módulos */
  #modalListaModulos table{
    display:none !important;
  }

  /* Contenedor tarjetas */
  #modulosCards{
    display:flex !important;
    flex-direction:column;
    gap:16px;
    margin-top:12px;
  }

  /* Tarjeta módulo */
  .modulo-card{
    position:relative;
    background:#fff;
    border-radius:18px;
    padding:16px;
    border:1px solid #e5e7eb;
    box-shadow:0 10px 22px rgba(0,0,0,.08);
  }

  .modulo-card h4{
    margin:0 0 6px;
    font-size:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
    color:#0f172a;
  }

  .modulo-card p{
    margin:4px 0;
    font-size:13px;
    color:#475569;
    line-height:1.4;
  }

  /* Badge estado */
  .modulo-badge{
    position:absolute;
    top:12px;
    right:12px;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
    color:#fff;
  }

  .modulo-badge.activo{ background:#10b981; }
  .modulo-badge.inactivo{ background:#ef4444; }

  /* Acciones */
  .modulo-actions{
    display:flex;
    gap:10px;
    margin-top:14px;
  }

  .modulo-actions button{
    flex:1;
    padding:12px;
    border-radius:14px;
    font-size:13px;
  }
}

/* ======================================================
   OCULTAR VERSION MOVIL EN ESCRITORIO
====================================================== */
@media (min-width:769px){

  /* Oculta tarjetas móviles */
  #modulosCards{
    display:none !important;
  }

  /* Asegura tabla visible en escritorio */
  #modalListaModulos table{
    display:table !important;
  }
}

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- CONTROLES -->
    <div class="controls">
      <button id="btnLoad" class="btn-primary" onclick="cargarUsuarios()">Cargar usuarios</button>
      <input id="busqueda" placeholder="Buscar usuario, nombre o rol" oninput="filtrar()">
      <button class="btn-success" onclick="abrirCrear()">+ Crear Usuario</button>

      <button class="btn-primary" onclick="abrirCrearModulo()">+ Crear Módulo</button>
      <button class="btn-primary" onclick="abrirListaModulos()"> Ver Módulos
      </button>


    </div>

    <!-- TABLA WEB -->
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Contraseña</th>
          <th>Nombre</th>
          <th>Rol</th>
          <th>Activo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios">
        <tr><td colspan="6">Presione “Cargar usuarios”</td></tr>
      </tbody>
    </table>

    <!-- TARJETAS MÓVIL -->
    <div id="mobileList" class="mobile-list"></div>

  </div>
</div>

<!-- ================= MODAL USUARIO ================= -->
<div class="modal" id="modalUsuario">
  <div class="modal-content">
    <h3 id="tituloUsuario"></h3>

    <input id="u_user" placeholder="Usuario">
    <input id="u_pass" placeholder="Contraseña">
    <input id="u_nombre" placeholder="Nombre">

    <select id="u_rol">
      <option>ADMIN</option>
      <option>OPERADOR</option>
      <option>SUPERVISOR</option>
    </select>

    <select id="u_activo">
      <option value="SI">ACTIVO</option>
      <option value="NO">INACTIVO</option>
    </select>

    <h4>Permisos</h4>
    <div class="permissions">
      <label><input type="checkbox" value="inventario"> Inventario</label>
      <label><input type="checkbox" value="etiquetas"> Etiquetas</label>
      <label><input type="checkbox" value="codigos"> Códigos</label>
      <label><input type="checkbox" value="dashboard"> Dashboard</label>
      <label><input type="checkbox" value="usuarios"> Usuarios</label>
<label><input type="checkbox" value="ubicaciones"> Ubicaciones</label>
<label><input type="checkbox" value="stock"> Ingreso de Productos</label>


    </div>

    <div class="footer-btns">
      <button id="btnGuardar" class="btn-success" onclick="guardarUsuario()">Guardar</button>
      <button class="btn-danger" onclick="cerrarUsuario()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ================= MODAL LISTA MODULOS ================= -->
<div class="modal" id="modalListaModulos">
  <div class="modal-content">
    <h3>Módulos del Sistema</h3>

    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Archivo</th>
          <th>Permiso</th>
          <th>Activo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaModulos">
        <tr><td colspan="5">Cargando…</td></tr>
      </tbody>
    </table>

<div id="modulosCards" class="modulos-cards"></div>


    <div class="footer-btns">
      <button class="btn-danger" onclick="cerrarListaModulos()">Cerrar</button>
    </div>
  </div>
</div>


<!-- ================= MODAL MÓDULO ================= -->
<div class="modal" id="modalModulo">
  <div class="modal-content">
    <h3>Crear Módulo</h3>

    <input id="m_nombre" placeholder="Nombre del módulo">
    <input id="m_archivo" placeholder="Archivo HTML (ej: index2.html)">
    <input id="m_icono" placeholder="Icono (ej: 📋)">
    <input id="m_permiso" placeholder="Permiso (ej: inventario)">

    <select id="m_activo">
      <option value="SI">ACTIVO</option>
      <option value="NO">INACTIVO</option>
    </select>

    <div class="footer-btns">
      <button class="btn-success" onclick="guardarModulo()">Guardar</button>
      <button class="btn-danger" onclick="cerrarModulo()">Cancelar</button>
    </div>
  </div>
</div>


   <script>
/* ================= CONFIG ================= */
const API = "https://script.google.com/macros/s/AKfycbwb_QOTIe9u1-LDSP1psBGeGkJ8gtC-n-e9H7E-rhf0gd2jU29sw-xHhXXp65OwQB_U/exec";

/* ================= ESTADO ================= */
let usuarios = [];
let modo = "crear";

/* ================= DOM (SEGUR0) ================= */
const $ = id => document.getElementById(id);

const btnLoad        = $("btnLoad");
const tablaUsuarios  = $("tablaUsuarios");
const mobileList     = $("mobileList");
const busqueda       = $("busqueda");

const modalUsuario   = $("modalUsuario");
const tituloUsuario  = $("tituloUsuario");

const u_user   = $("u_user");
const u_pass   = $("u_pass");
const u_nombre = $("u_nombre");
const u_rol    = $("u_rol");
const u_activo = $("u_activo");
const btnGuardar = $("btnGuardar");

/* ================= AUTO CARGA ================= */
document.addEventListener("DOMContentLoaded", () => {
  console.clear();
  console.log("Panel iniciado");
  cargarUsuarios();
});

/* ================= CARGAR USUARIOS ================= */
async function cargarUsuarios(){
  if (!btnLoad) return;

  btnLoad.classList.add("loading");
  btnLoad.innerHTML = `<div class="loader"></div> Cargando`;

  try {
    const r = await fetch(API + "?action=listarUsuarios");
    const text = await r.text();
    console.log("RAW RESPONSE:", text);

    const d = JSON.parse(text);
    usuarios = Array.isArray(d.data) ? d.data : [];

    render(usuarios);

  } catch (e) {
    console.error(e);
    tablaUsuarios.innerHTML =
      `<tr><td colspan="6">Error al cargar</td></tr>`;
  }

  btnLoad.classList.remove("loading");
  btnLoad.innerHTML = "Cargar usuarios";
}

/* ================= RENDER ================= */
function render(data){
  tablaUsuarios.innerHTML = "";
  mobileList.innerHTML = "";

  if (!data.length){
    tablaUsuarios.innerHTML =
      `<tr><td colspan="6">Sin usuarios</td></tr>`;
    return;
  }

  data.forEach(u => {
    // Esperado: [fecha, usuario, pass, nombre, rol, activo, permisos]
    const usuario = u[1];
    const pass    = u[2];
    const nombre  = u[3];
    const rol     = u[4];
    const activo  = u[5];
    const permisos= u[6] || "";

    tablaUsuarios.innerHTML += `
      <tr>
        <td>${usuario}</td>
        <td>${pass}</td>
        <td>${nombre}</td>
        <td>${rol}</td>
        <td>${activo}</td>
        <td>
          <button class="btn-edit"
            onclick="editar('${esc(usuario)}','${esc(pass)}','${esc(nombre)}','${esc(rol)}','${esc(activo)}','${esc(permisos)}')">
            Editar
          </button>
          <button class="btn-danger"
            onclick="eliminarUsuario('${esc(usuario)}')">
            Eliminar
          </button>
        </td>
      </tr>`;

    mobileList.innerHTML += `
      <div class="mobile-card">
        <h4>${nombre}</h4>
        <p><b>Usuario:</b> ${usuario}</p>
        <p><b>Rol:</b> ${rol}</p>
        <div class="mobile-actions">
          <button class="btn-edit"
            onclick="editar('${esc(usuario)}','${esc(pass)}','${esc(nombre)}','${esc(rol)}','${esc(activo)}','${esc(permisos)}')">
            Editar
          </button>
          <button class="btn-danger"
            onclick="eliminarUsuario('${esc(usuario)}')">
            Eliminar
          </button>
        </div>
      </div>`;
  });
}

/* ================= FILTRO ================= */
function filtrar(){
  const q = (busqueda.value || "").toLowerCase();
  render(
    usuarios.filter(u =>
      (u[1]||"").toLowerCase().includes(q) ||
      (u[3]||"").toLowerCase().includes(q) ||
      (u[4]||"").toLowerCase().includes(q)
    )
  );
}

/* ================= MODAL ================= */
function abrirCrear(){
  modo = "crear";
  tituloUsuario.innerText = "Crear Usuario";
  u_user.disabled = false;
  limpiar();
  modalUsuario.style.display = "flex";
}

function editar(u,p,n,r,a,per){
  modo = "editar";
  tituloUsuario.innerText = "Editar Usuario";

  u_user.value = u; u_user.disabled = true;
  u_pass.value = p;
  u_nombre.value = n;
  u_rol.value = r;
  u_activo.value = a;

  document.querySelectorAll(".permissions input")
    .forEach(c => c.checked = per.includes(c.value));

  modalUsuario.style.display = "flex";
}

function cerrarUsuario(){
  modalUsuario.style.display = "none";
}

function limpiar(){
  u_user.value = "";
  u_pass.value = "";
  u_nombre.value = "";
  u_rol.value = "ADMIN";
  u_activo.value = "SI";
  document.querySelectorAll(".permissions input")
    .forEach(c => c.checked = false);
}

/* ================= GUARDAR ================= */
async function guardarUsuario(){
  const permisos = [...document.querySelectorAll(".permissions input:checked")]
    .map(c => c.value).join(",");

  const fd = new FormData();
  fd.append("action", modo==="crear" ? "crearUsuario" : "editarUsuario");
  fd.append("username", u_user.value);
  fd.append("password", u_pass.value);
  fd.append("nombre", u_nombre.value);
  fd.append("rol", u_rol.value);
  fd.append("activo", u_activo.value);
  fd.append("permisos", permisos);

  await fetch(API, { method:"POST", body:fd });
  cerrarUsuario();
  cargarUsuarios();
}

/* ================= ELIMINAR ================= */
async function eliminarUsuario(u){
  if(!confirm("Eliminar "+u+"?")) return;

  const fd = new FormData();
  fd.append("action","eliminarUsuario");
  fd.append("username",u);

  await fetch(API, { method:"POST", body:fd });
  cargarUsuarios();
}

/* ================= UTIL ================= */
function esc(t){
  return String(t||"")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'")
    .replace(/"/g,'\\"')
    .replace(/\n/g," ");
}
</script>   
 


<script src="segurity.js"></script>


</body>
</html>
