<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ======================================================
   BASE
====================================================== */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:#f4f7fb;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}

/* ======================================================
   CONTROLES
====================================================== */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.controls input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  width:260px;
  max-width:100%;
}

button{
  border:none;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  font-size:14px;
}

.btn-primary{ background:#3b82f6; color:#fff; }
.btn-success{ background:#10b981; color:#fff; }
.btn-edit{ background:#6366f1; color:#fff; padding:6px 12px; }
.btn-danger{ background:#ef4444; color:#fff; padding:6px 12px; }

/* ======================================================
   LOADER
====================================================== */
.loader{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,.4);
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg) }
}

.loading{
  pointer-events:none;
  opacity:.8;
  display:flex;
  align-items:center;
  gap:8px;
  justify-content:center;
}

/* ======================================================
   TABLA WEB
====================================================== */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f1f5f9;
  padding:12px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:13px;
  text-align:center;
}

/* ======================================================
   MODALES (GENERAL)
====================================================== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-content{
  background:#fff;
  width:520px;
  max-width:92%;
  max-height:90vh;
  overflow:auto;
  padding:20px;
  border-radius:16px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.permissions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.footer-btns{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.footer-btns button{
  flex:1;
}

/* ======================================================
   MOBILE GENERAL
====================================================== */
.mobile-list{
  display:none;
}

@media(max-width:768px){

  /* Oculta tabla principal */
  .card > table,
  .card > table thead{
    display:none;
  }

  .controls input{
    width:100%;
  }

  .mobile-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .mobile-card{
    background:#fff;
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    border:1px solid #e5e7eb;
  }

  .mobile-card h4{
    margin:0 0 6px;
    font-size:15px;
  }

  .mobile-card p{
    margin:4px 0;
    font-size:13px;
    color:#475569;
  }

  .mobile-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
  }

  .mobile-actions button{
    flex:1;
  }
}

/* ======================================================
   MODAL MÓDULOS – ESTILO FINAL MÓVIL
====================================================== */
@media (max-width:768px){

  #modalListaModulos{
    align-items:flex-end;
  }

  #modalListaModulos .modal-content{
    width:100%;
    max-height:92dvh;
    border-radius:22px 22px 0 0;
    padding:18px 16px 22px;
    animation:slideUp .3s ease;
  }

  @keyframes slideUp{
    from{ transform:translateY(40px); opacity:0 }
    to{ transform:translateY(0); opacity:1 }
  }

  /* Oculta tabla SOLO en modal módulos */
  #modalListaModulos table{
    display:none !important;
  }

  /* Contenedor tarjetas */
  #modulosCards{
    display:flex !important;
    flex-direction:column;
    gap:16px;
    margin-top:12px;
  }

  /* Tarjeta módulo */
  .modulo-card{
    position:relative;
    background:#fff;
    border-radius:18px;
    padding:16px;
    border:1px solid #e5e7eb;
    box-shadow:0 10px 22px rgba(0,0,0,.08);
  }

  .modulo-card h4{
    margin:0 0 6px;
    font-size:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
    color:#0f172a;
  }

  .modulo-card p{
    margin:4px 0;
    font-size:13px;
    color:#475569;
    line-height:1.4;
  }

  /* Badge estado */
  .modulo-badge{
    position:absolute;
    top:12px;
    right:12px;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
    color:#fff;
  }

  .modulo-badge.activo{ background:#10b981; }
  .modulo-badge.inactivo{ background:#ef4444; }

  /* Acciones */
  .modulo-actions{
    display:flex;
    gap:10px;
    margin-top:14px;
  }

  .modulo-actions button{
    flex:1;
    padding:12px;
    border-radius:14px;
    font-size:13px;
  }
}

/* ======================================================
   OCULTAR VERSION MOVIL EN ESCRITORIO
====================================================== */
@media (min-width:769px){

  /* Oculta tarjetas móviles */
  #modulosCards{
    display:none !important;
  }

  /* Asegura tabla visible en escritorio */
  #modalListaModulos table{
    display:table !important;
  }
}

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- CONTROLES -->
    <div class="controls">
      <button id="btnLoad" class="btn-primary" onclick="cargarUsuarios()">Cargar usuarios</button>
      <input id="busqueda" placeholder="Buscar usuario, nombre o rol" oninput="filtrar()">
      <button class="btn-success" onclick="abrirCrear()">+ Crear Usuario</button>
      
      <button class="btn-primary" onclick="abrirCrearModulo()">+ Crear Módulo</button>
      <button class="btn-primary" onclick="abrirListaModulos()"> Ver Módulos
      </button>
      

    </div>

    <!-- TABLA WEB -->
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Contraseña</th>
          <th>Nombre</th>
          <th>Rol</th>
          <th>Activo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios">
        <tr><td colspan="6">Presione “Cargar usuarios”</td></tr>
      </tbody>
    </table>

    <!-- TARJETAS MÓVIL -->
    <div id="mobileList" class="mobile-list"></div>

  </div>
</div>

<!-- ================= MODAL USUARIO ================= -->
<div class="modal" id="modalUsuario">
  <div class="modal-content">
    <h3 id="tituloUsuario"></h3>

    <input id="u_user" placeholder="Usuario">
    <input id="u_pass" placeholder="Contraseña">
    <input id="u_nombre" placeholder="Nombre">

    <select id="u_rol">
      <option>ADMIN</option>
      <option>OPERADOR</option>
      <option>SUPERVISOR</option>
    </select>

    <select id="u_activo">
      <option value="SI">ACTIVO</option>
      <option value="NO">INACTIVO</option>
    </select>

    <h4>Permisos</h4>
    <div class="permissions">
      <label><input type="checkbox" value="inventario"> Inventario</label>
      <label><input type="checkbox" value="etiquetas"> Etiquetas</label>
      <label><input type="checkbox" value="codigos"> Códigos</label>
      <label><input type="checkbox" value="dashboard"> Dashboard</label>
      <label><input type="checkbox" value="usuarios"> Usuarios</label>
<label><input type="checkbox" value="ubicaciones"> Ubicaciones</label>
<label><input type="checkbox" value="stock"> Ingreso de Productos</label>


    </div>

    <div class="footer-btns">
      <button id="btnGuardar" class="btn-success" onclick="guardarUsuario()">Guardar</button>
      <button class="btn-danger" onclick="cerrarUsuario()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ================= MODAL LISTA MODULOS ================= -->
<div class="modal" id="modalListaModulos">
  <div class="modal-content">
    <h3>Módulos del Sistema</h3>

    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Archivo</th>
          <th>Permiso</th>
          <th>Activo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaModulos">
        <tr><td colspan="5">Cargando…</td></tr>
      </tbody>
    </table>

<div id="modulosCards" class="modulos-cards"></div>


    <div class="footer-btns">
      <button class="btn-danger" onclick="cerrarListaModulos()">Cerrar</button>
    </div>
  </div>
</div>


<!-- ================= MODAL MÓDULO ================= -->
<div class="modal" id="modalModulo">
  <div class="modal-content">
    <h3>Crear Módulo</h3>

    <input id="m_nombre" placeholder="Nombre del módulo">
    <input id="m_archivo" placeholder="Archivo HTML (ej: index2.html)">
    <input id="m_icono" placeholder="Icono (ej: 📋)">
    <input id="m_permiso" placeholder="Permiso (ej: inventario)">

    <select id="m_activo">
      <option value="SI">ACTIVO</option>
      <option value="NO">INACTIVO</option>
    </select>

    <div class="footer-btns">
      <button class="btn-success" onclick="guardarModulo()">Guardar</button>
      <button class="btn-danger" onclick="cerrarModulo()">Cancelar</button>
    </div>
  </div>
</div>

<script>
  /* ======================================================
     CONFIGURACIÓN API
  ====================================================== */
  const API =
  "https://script.google.com/macros/s/AKfycbzC9hVb8IM8Tx51FVeRQwO0YzNV_DcwD7iM3119D_EzqD9BY1WXo_9SUa7OEAtTsOUV/exec";
  
  /* ======================================================
     ESTADO
  ====================================================== */
  let usuarios = [];
  let modo = "crear";
  
  /* ======================================================
     HELPERS DOM
  ====================================================== */
  const $ = id => document.getElementById(id);
  
  /* ======================================================
     SEGURIDAD BÁSICA
  ====================================================== */
  function getToken(){
    const token = localStorage.getItem("token");
    if(!token){
      alert("Sesión no válida");
      location.href = "index.html";
      return null;
    }
    return token;
  }
  
  /* ======================================================
     CARGAR USUARIOS
  ====================================================== */
  async function cargarUsuarios(){
  
    const token = getToken();
    if(!token) return;
  
    btnLoad.classList.add("loading");
    btnLoad.innerHTML = `<div class="loader"></div> Cargando`;
  
    try{
      const r = await fetch(API,{
        method:"POST",
        headers:{
          "Content-Type":"text/plain;charset=UTF-8"
        },
        body: JSON.stringify({
          action:"listarUsuarios",
          token
        })
      });
  
      const res = await r.json();
  
      if(!res.ok){
        throw res.msg || "Error backend";
      }
  
      usuarios = Array.isArray(res.data) ? res.data : [];
      renderUsuarios(usuarios);
  
    }catch(err){
      console.error(err);
      tablaUsuarios.innerHTML =
        `<tr><td colspan="6">Error al cargar usuarios</td></tr>`;
      mobileList.innerHTML = "";
    }
  
    btnLoad.classList.remove("loading");
    btnLoad.innerText = "Cargar usuarios";
  }
  
  /* ======================================================
     RENDER
  ====================================================== */
  function renderUsuarios(data){
  
    tablaUsuarios.innerHTML = "";
    mobileList.innerHTML = "";
  
    if(!data.length){
      tablaUsuarios.innerHTML =
        `<tr><td colspan="6">Sin usuarios</td></tr>`;
      return;
    }
  
    data.forEach(u => {
  
      const usuario  = u[1];
      const pass     = u[2];
      const nombre   = u[3];
      const rol      = u[4];
      const activo   = u[5];
      const permisos = u[6] || "";
  
      tablaUsuarios.innerHTML += `
        <tr>
          <td>${usuario}</td>
          <td>${pass}</td>
          <td>${nombre}</td>
          <td>${rol}</td>
          <td>${activo}</td>
          <td>
            <button class="btn-edit"
              onclick="editarUsuario(
                '${usuario}','${pass}','${nombre}',
                '${rol}','${activo}','${permisos}'
              )">
              Editar
            </button>
            <button class="btn-danger"
              onclick="eliminarUsuario('${usuario}')">
              Eliminar
            </button>
          </td>
        </tr>`;
  
      mobileList.innerHTML += `
        <div class="mobile-card">
          <h4>${nombre}</h4>
          <p><b>Usuario:</b> ${usuario}</p>
          <p><b>Rol:</b> ${rol}</p>
          <div class="mobile-actions">
            <button class="btn-edit"
              onclick="editarUsuario(
                '${usuario}','${pass}','${nombre}',
                '${rol}','${activo}','${permisos}'
              )">
              Editar
            </button>
            <button class="btn-danger"
              onclick="eliminarUsuario('${usuario}')">
              Eliminar
            </button>
          </div>
        </div>`;
    });
  }
  
  /* ======================================================
     FILTRO
  ====================================================== */
  function filtrar(){
    const q = busqueda.value.toLowerCase();
    renderUsuarios(
      usuarios.filter(u =>
        u[1].toLowerCase().includes(q) ||
        u[3].toLowerCase().includes(q) ||
        u[4].toLowerCase().includes(q)
      )
    );
  }
  
  /* ======================================================
     MODAL USUARIO
  ====================================================== */
  function abrirCrear(){
    modo = "crear";
    tituloUsuario.innerText = "Crear Usuario";
    u_user.disabled = false;
    limpiarUsuario();
    modalUsuario.style.display = "flex";
  }
  
  function editarUsuario(u,p,n,r,a,per){
    modo = "editar";
    tituloUsuario.innerText = "Editar Usuario";
  
    u_user.value = u;
    u_user.disabled = true;
    u_pass.value = p;
    u_nombre.value = n;
    u_rol.value = r;
    u_activo.value = a;
  
    document.querySelectorAll(".permissions input")
      .forEach(c => c.checked = (per||"").includes(c.value));
  
    modalUsuario.style.display = "flex";
  }
  
  function cerrarUsuario(){
    modalUsuario.style.display = "none";
  }
  
  function limpiarUsuario(){
    u_user.value = "";
    u_pass.value = "";
    u_nombre.value = "";
    u_rol.value = "ADMIN";
    u_activo.value = "SI";
    document.querySelectorAll(".permissions input")
      .forEach(c => c.checked = false);
  }
  
  /* ======================================================
     GUARDAR USUARIO
  ====================================================== */
  async function guardarUsuario(){
  
    const token = getToken();
    if(!token) return;
  
    const permisos = [...document.querySelectorAll(".permissions input:checked")]
      .map(c => c.value).join(",");
  
    await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain;charset=UTF-8"
      },
      body: JSON.stringify({
        action: modo === "crear" ? "crearUsuario" : "editarUsuario",
        token,
        username: u_user.value,
        password: u_pass.value,
        nombre: u_nombre.value,
        rol: u_rol.value,
        activo: u_activo.value,
        permisos
      })
    });
  
    cerrarUsuario();
    cargarUsuarios();
  }
  
  /* ======================================================
     ELIMINAR USUARIO
  ====================================================== */
  async function eliminarUsuario(usuario){
  
    if(!confirm("Eliminar " + usuario + " ?")) return;
  
    await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain;charset=UTF-8"
      },
      body: JSON.stringify({
        action:"eliminarUsuario",
        token: localStorage.getItem("token"),
        username: usuario
      })
    });
  
    cargarUsuarios();
  }
  </script>

<script>
/* ======================================================
   MODULOS – SCRIPT COMPLETO AUTÓNOMO
====================================================== */

/* ================= URL ================= */
const API =
"https://script.google.com/macros/s/AKfycbzC9hVb8IM8Tx51FVeRQwO0YzNV_DcwD7iM3119D_EzqD9BY1WXo_9SUa7OEAtTsOUV/exec";

/* ================= DOM ================= */
const tablaModulos       = document.getElementById("tablaModulos");
const modulosCards       = document.getElementById("modulosCards");
const modalModulo        = document.getElementById("modalModulo");
const modalListaModulos  = document.getElementById("modalListaModulos");

const m_nombre  = document.getElementById("m_nombre");
const m_archivo = document.getElementById("m_archivo");
const m_icono   = document.getElementById("m_icono");
const m_permiso = document.getElementById("m_permiso");
const m_activo  = document.getElementById("m_activo");

/* ================= ESTADO ================= */
let MODULOS = [];
let MODO_MODULO = "crear";

/* ================= MODALES ================= */
function abrirCrearModulo(){
  MODO_MODULO = "crear";
  m_nombre.value  = "";
  m_archivo.value = "";
  m_icono.value   = "";
  m_permiso.value = "";
  m_activo.value  = "SI";
  modalModulo.style.display = "flex";
}

function cerrarModulo(){
  modalModulo.style.display = "none";
}

function abrirListaModulos(){
  modalListaModulos.style.display = "flex";
  cargarModulos();
}

function cerrarListaModulos(){
  modalListaModulos.style.display = "none";
}

/* ================= CARGAR ================= */
async function cargarModulos(){
  try{
    const r = await fetch(API + "?action=listarModulos");
    const d = await r.json();
    MODULOS = Array.isArray(d.data) ? d.data : [];
    renderModulos();
  }catch(e){
    tablaModulos.innerHTML =
      `<tr><td colspan="5">Error al cargar módulos</td></tr>`;
  }
}

/* ================= RENDER ================= */
function renderModulos(){

  tablaModulos.innerHTML = "";
  modulosCards.innerHTML = "";

  if(!MODULOS.length){
    tablaModulos.innerHTML =
      `<tr><td colspan="5">Sin módulos</td></tr>`;
    return;
  }

  MODULOS.forEach(m => {

    const nombre  = m[1];
    const archivo = m[2];
    const icono   = m[3];
    const permiso = m[4];
    const activo  = m[5];

    tablaModulos.innerHTML += `
      <tr>
        <td>${nombre}</td>
        <td>${archivo}</td>
        <td>${permiso}</td>
        <td>${activo}</td>
        <td>
          <button class="btn-edit"
            onclick="editarModulo(
              '${nombre}','${archivo}',
              '${icono}','${permiso}','${activo}'
            )">Editar</button>
          <button class="btn-danger"
            onclick="eliminarModulo('${nombre}')">Eliminar</button>
        </td>
      </tr>`;

    modulosCards.innerHTML += `
      <div class="modulo-card">
        <span class="modulo-badge ${activo==='SI'?'activo':'inactivo'}">
          ${activo}
        </span>
        <h4>${icono || "📦"} ${nombre}</h4>
        <p><b>Archivo:</b> ${archivo}</p>
        <p><b>Permiso:</b> ${permiso}</p>
        <div class="modulo-actions">
          <button class="btn-edit"
            onclick="editarModulo(
              '${nombre}','${archivo}',
              '${icono}','${permiso}','${activo}'
            )">Editar</button>
          <button class="btn-danger"
            onclick="eliminarModulo('${nombre}')">Eliminar</button>
        </div>
      </div>`;
  });
}

/* ================= EDITAR ================= */
function editarModulo(nombre, archivo, icono, permiso, activo){
  MODO_MODULO = "editar";
  m_nombre.value  = nombre;
  m_archivo.value = archivo;
  m_icono.value   = icono;
  m_permiso.value = permiso;
  m_activo.value  = activo;
  modalModulo.style.display = "flex";
}

/* ================= GUARDAR ================= */
async function guardarModulo(){

  const fd = new FormData();
  fd.append("action", MODO_MODULO === "crear" ? "crearModulo" : "editarModulo");
  fd.append("nombre",  m_nombre.value);
  fd.append("archivo", m_archivo.value);
  fd.append("icono",   m_icono.value);
  fd.append("permiso", m_permiso.value);
  fd.append("activo",  m_activo.value);

  await fetch(API,{ method:"POST", body:fd });

  cerrarModulo();
  cargarModulos();
}

/* ================= ELIMINAR ================= */
async function eliminarModulo(nombre){
  if(!confirm("¿Eliminar módulo " + nombre + "?")) return;

  const fd = new FormData();
  fd.append("action","eliminarModulo");
  fd.append("nombre",nombre);

  await fetch(API,{ method:"POST", body:fd });

  cargarModulos();
}
</script>

</body>
</html>
