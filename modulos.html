<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Módulos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;padding:20px;background:#f4f6f9}

.container{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08)
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px
}

button{
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600
}
.primary{background:#2563eb;color:#fff}
.secondary{background:#64748b;color:#fff}
.edit{background:#22c55e;color:#fff}
.delete{background:#ef4444;color:#fff}

table{width:100%;border-collapse:collapse}
thead{background:#f1f5f9}
th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center
}
.modal.active{display:flex}
.modal-content{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:12px
}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:13px}
.form-group input,.form-group select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h2>Módulos</h2>
    <div>
      <button class="secondary" onclick="cargar()">Cargar</button>
      <button class="primary" onclick="nuevo()">+ Nuevo</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>NOMBRE</th>
        <th>ARCHIVO</th>
        <th>ICONO</th>
        <th>PERMISO</th>
        <th>ACTIVO</th>
        <th>ACCIONES</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="titulo">Nuevo módulo</h3>

    <div class="form-group"><label>ID</label><input id="id"></div>
    <div class="form-group"><label>Nombre</label><input id="nombre"></div>
    <div class="form-group"><label>Archivo</label><input id="archivo"></div>
    <div class="form-group"><label>Icono</label><input id="icono"></div>
    <div class="form-group"><label>Permiso</label><input id="permiso"></div>
    <div class="form-group">
      <label>Activo</label>
      <select id="activo"><option>SI</option><option>NO</option></select>
    </div>

    <button class="primary" onclick="guardar()">Guardar</button>
    <button class="secondary" onclick="cerrar()">Cancelar</button>
  </div>
</div>

<script>
const API =
"https://script.google.com/macros/s/AKfycbyqukiXC5BZKB4iR45zH1gFWDF1Nxk5DfNADr1YZz2W5Gue86hyoBIBsgk-KH5vPy8F/exec";

let modo="crear";

/* TOKEN */
function getToken(){
  const t=localStorage.getItem("token");
  if(!t){ alert("Sesión inválida"); location.href="index.html"; }
  return t;
}

/* LISTAR → GET */
function cargar(){
  fetch(API+"?action=listarModulos")
    .then(r=>r.json())
    .then(res=>{
      tabla.innerHTML="";
      if(!res.data.length){
        tabla.innerHTML=`<tr><td colspan="7">Sin módulos</td></tr>`;
        return;
      }
      res.data.forEach(m=>{
        tabla.innerHTML+=`
        <tr>
          <td>${m[0]}</td>
          <td>${m[1]}</td>
          <td>${m[2]}</td>
          <td>${m[3]}</td>
          <td>${m[4]}</td>
          <td>${m[5]}</td>
          <td>
            <button class="edit" onclick='editar(${JSON.stringify(m)})'>Editar</button>
            <button class="delete" onclick='eliminar("${m[0]}")'>Eliminar</button>
          </td>
        </tr>`;
      });
    });
}

function nuevo(){
  modo="crear";
  titulo.innerText="Nuevo módulo";
  id.value=nombre.value=archivo.value=icono.value=permiso.value="";
  activo.value="SI";
  modal.classList.add("active");
}

function editar(m){
  modo="editar";
  titulo.innerText="Editar módulo";
  id.value=m[0];
  nombre.value=m[1];
  archivo.value=m[2];
  icono.value=m[3];
  permiso.value=m[4];
  activo.value=m[5];
  modal.classList.add("active");
}

function guardar(){
  fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=UTF-8" },
    body:JSON.stringify({
      action: modo==="crear"?"crearModulo":"editarModulo",
      token:getToken(),
      id:id.value,
      nombre:nombre.value,
      archivo:archivo.value,
      icono:icono.value,
      permiso:permiso.value,
      activo:activo.value
    })
  }).then(()=>{ cerrar(); cargar(); });
}

function eliminar(idm){
  if(!confirm("Eliminar módulo "+idm+"?"))return;
  fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=UTF-8" },
    body:JSON.stringify({
      action:"eliminarModulo",
      token:getToken(),
      id:idm
    })
  }).then(cargar);
}

function cerrar(){
  modal.classList.remove("active");
}
</script>

</body>
</html>
