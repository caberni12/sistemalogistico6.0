<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Módulos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont}
body{margin:0;padding:20px;background:#f4f6f9;color:#333}

.container{
  max-width:1200px;margin:auto;background:#fff;
  border-radius:12px;padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08)
}

.header{
  display:flex;justify-content:space-between;
  align-items:center;gap:10px;flex-wrap:wrap
}
.header h1{margin:0;font-size:22px}
.header .buttons{display:flex;gap:10px}

button{
  border:none;padding:10px 16px;border-radius:8px;
  cursor:pointer;font-weight:600
}
.primary{background:#2563eb;color:#fff}
.secondary{background:#64748b;color:#fff}

table{width:100%;border-collapse:collapse;margin-top:15px}
thead{background:#f1f5f9}
th,td{padding:12px;text-align:left;font-size:14px}
th{font-weight:600}
tr{border-bottom:1px solid #e5e7eb}

.actions button{padding:6px 10px;border-radius:6px}
.edit{background:#22c55e;color:#fff}
.delete{background:#ef4444;color:#fff}

.msg{
  margin-top:15px;
  padding:12px;
  border-radius:8px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  font-size:13px;
  white-space:pre-wrap;
}

/* MODAL */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;justify-content:center;align-items:center;z-index:999
}
.modal.active{display:flex}
.modal-content{
  background:#fff;width:100%;max-width:480px;
  border-radius:12px;padding:20px
}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;margin-bottom:4px}
.form-group input,.form-group select{
  width:100%;padding:10px;border-radius:6px;border:1px solid #d1d5db
}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

@media(max-width:700px){
  table,thead,tbody,tr,th,td{display:block;width:100%}
  thead{display:none}
  tr{background:#f9fafb;margin-bottom:15px;padding:10px;border-radius:8px}
  td{display:flex;justify-content:space-between;padding:6px 0}
  td::before{content:attr(data-label);font-weight:600}
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>Módulos del Sistema</h1>
    <div class="buttons">
      <button id="btnLoad" class="secondary" onclick="cargarModulos()">Cargar módulos</button>
      <button class="primary" onclick="abrirCrear()">+ Nuevo Módulo</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>NOMBRE</th>
        <th>ARCHIVO</th>
        <th>ICONO</th>
        <th>PERMISO</th>
        <th>ACTIVO</th>
        <th>ACCIONES</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div id="msg" class="msg" style="display:none"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="tituloModal">Nuevo Módulo</h2>

    <div class="form-group">
      <label>ID</label>
      <input id="m_id">
    </div>
    <div class="form-group">
      <label>NOMBRE</label>
      <input id="m_nombre">
    </div>
    <div class="form-group">
      <label>ARCHIVO</label>
      <input id="m_archivo" placeholder="ventas.html">
    </div>
    <div class="form-group">
      <label>ICONO</label>
      <input id="m_icono" placeholder="📦">
    </div>
    <div class="form-group">
      <label>PERMISO</label>
      <input id="m_permiso" placeholder="admin">
    </div>
    <div class="form-group">
      <label>ACTIVO</label>
      <select id="m_activo">
        <option value="SI">SI</option>
        <option value="NO">NO</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="secondary" onclick="cerrar()">Cancelar</button>
      <button class="primary" onclick="guardarModulo()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ======================================================
   CONFIG
====================================================== */
const API =
"https://script.google.com/macros/s/AKfycbyqukiXC5BZKB4iR45zH1gFWDF1Nxk5DfNADr1YZz2W5Gue86hyoBIBsgk-KH5vPy8F/exec";

let modulos = [];
let modo = "crear";

/* ======================================================
   TOKEN (IGUAL QUE USUARIOS)
====================================================== */
function getToken(){
  const token = localStorage.getItem("token");
  if(!token){
    alert("Sesión no válida");
    location.href = "index.html";
    return null;
  }
  return token;
}

/* ======================================================
   CARGAR MODULOS (ACCION PERMITIDA)
====================================================== */
async function cargarModulos(){

  const token = getToken();
  if(!token) return;

  btnLoad.innerText = "Cargando…";
  msg.style.display="none";
  tabla.innerHTML = "";

  try{
    const r = await fetch(API,{
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=UTF-8" },
      body: JSON.stringify({
        action: "listarTabla",
        nombre: "MODULOS",
        token
      })
    });

    const res = await r.json();

    msg.style.display="block";
    msg.innerText = "Respuesta backend:\n" + JSON.stringify(res,null,2);

    if(!res.ok){
      throw res.msg || "Error backend";
    }

    modulos = Array.isArray(res.data) ? res.data : [];

    if(!modulos.length){
      tabla.innerHTML =
        `<tr><td colspan="7">Sin módulos</td></tr>`;
      return;
    }

    renderModulos(modulos);

  }catch(err){
    console.error(err);
    tabla.innerHTML =
      `<tr><td colspan="7">Error al cargar módulos</td></tr>`;
    msg.style.display="block";
    msg.innerText = "ERROR:\n" + err;
  }

  btnLoad.innerText = "Cargar módulos";
}

/* ======================================================
   RENDER (ARRAY POR ÍNDICE)
====================================================== */
function renderModulos(data){

  tabla.innerHTML = "";

  data.forEach(m => {

    const id      = m[0];
    const nombre  = m[1];
    const archivo = m[2];
    const icono   = m[3];
    const permiso = m[4];
    const activo  = m[5];

    tabla.innerHTML += `
      <tr>
        <td data-label="ID">${id}</td>
        <td data-label="NOMBRE">${nombre}</td>
        <td data-label="ARCHIVO">${archivo}</td>
        <td data-label="ICONO">${icono}</td>
        <td data-label="PERMISO">${permiso}</td>
        <td data-label="ACTIVO">${activo}</td>
        <td data-label="ACCIONES" class="actions">
          <button class="edit"
            onclick="editarModulo(
              '${id}','${nombre}','${archivo}',
              '${icono}','${permiso}','${activo}'
            )">Editar</button>
          <button class="delete"
            onclick="eliminarModulo('${id}')">Eliminar</button>
        </td>
      </tr>`;
  });
}

/* ======================================================
   MODAL
====================================================== */
function abrirCrear(){
  modo="crear";
  tituloModal.innerText="Crear Módulo";
  limpiar();
  modal.classList.add("active");
}

function editarModulo(id,n,a,i,p,ac){
  modo="editar";
  m_id.value=id;
  m_nombre.value=n;
  m_archivo.value=a;
  m_icono.value=i;
  m_permiso.value=p;
  m_activo.value=ac;
  modal.classList.add("active");
}

function cerrar(){
  modal.classList.remove("active");
}

function limpiar(){
  m_id.value="";
  m_nombre.value="";
  m_archivo.value="";
  m_icono.value="";
  m_permiso.value="";
  m_activo.value="SI";
}

/* ======================================================
   GUARDAR (MISMA ACCION QUE TU BACKEND USE)
====================================================== */
async function guardarModulo(){

  const token = getToken();
  if(!token) return;

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=UTF-8" },
    body: JSON.stringify({
      action: modo === "crear" ? "guardarTabla" : "guardarTabla",
      nombre: "MODULOS",
      token,
      fila: m_id.value,
      data: [
        m_id.value,
        m_nombre.value,
        m_archivo.value,
        m_icono.value,
        m_permiso.value,
        m_activo.value
      ]
    })
  });

  cerrar();
  cargarModulos();
}

/* ======================================================
   ELIMINAR
====================================================== */
async function eliminarModulo(id){

  if(!confirm("Eliminar módulo "+id+" ?")) return;

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=UTF-8" },
    body: JSON.stringify({
      action:"eliminarTabla",
      nombre:"MODULOS",
      token,
      fila:id
    })
  });

  cargarModulos();
}
</script>

</body>
</html>
