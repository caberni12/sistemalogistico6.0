<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --text:#0f172a;
 --muted:#64748b;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
 --header-h:64px;
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
html,body{
 margin:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* BOTONES */
button{
 border:none;
 border-radius:var(--radius);
 padding:8px 12px;
 font-weight:600;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 gap:6px;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--border)}

/* HEADER */
header{
 position:fixed;
 top:0;left:0;right:0;
 height:var(--header-h);
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 12px;
 border-bottom:1px solid var(--border);
 z-index:1000;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:38px;
 height:38px;
 background:#14b8a6;
 color:#fff;
 font-size:20px;
}

.header-title{
 display:flex;
 flex-direction:column;
 line-height:1.1;
}

.header-title strong{
 font-size:14px;
}
.header-title span{
 font-size:11px;
 color:var(--muted);
}

.header-right{
 display:flex;
 gap:8px;
}

/* MENU */
.menu-lateral{
 position:fixed;
 top:0;left:-280px;
 width:280px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.3s;
 z-index:1500;
}
.menu-lateral.open{left:0}
.menu-header{
 padding:14px;
 border-bottom:1px solid var(--border);
 font-weight:700;
}
.menu-items{
 padding:12px;
 display:flex;
 flex-direction:column;
 gap:8px;
}
.menu-item{
 padding:12px;
 border-radius:10px;
 background:#f8fafc;
 font-weight:600;
 cursor:pointer;
}

/* MAPA */
#mapaBox{
 margin-top:var(--header-h);
 height:calc(100vh - var(--header-h));
 position:relative;
}
#mapa{width:100%;height:100%}

/* LEAFLET CONTROLS */
.leaflet-top{
 top:auto !important;
 bottom:90px !important;
 right:10px !important;
 left:auto !important;
}

/* DASHBOARD */
#dashboardMapa{
 position:absolute;
 bottom:12px;
 left:12px;
 right:12px;
 background:#fff;
 border-radius:14px;
 padding:12px;
 font-size:12px;
 box-shadow:0 10px 24px rgba(0,0,0,.22);
}

/* VISOR */
.viewer{
 display:none;
 position:fixed;
 top:var(--header-h);
 left:0;right:0;bottom:0;
 background:#fff;
 z-index:1200;
}
.viewer iframe{
 width:100%;
 height:100%;
 border:none;
}

/* LOADER */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.9);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:3000;
}
#progressBar{
 position:fixed;
 top:0;left:0;
 height:3px;
 width:0%;
 background:var(--primary);
 z-index:3001;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
 <div class="menu-header">Panel de Gestión</div>
 <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
 <div class="header-left">
  <button id="btnMenu" onclick="toggleMenu()">≡</button>

  <div class="header-title">
   <strong id="empresaNombre">—</strong>
   <span id="empresaRut">—</span>
  </div>
 </div>

 <div class="header-right">
  <button id="btnVolver" class="btn-ghost" onclick="volver()" style="display:none">⬅</button>
  <button class="btn-ghost" onclick="toggleHeader()">👁</button>
  <button class="btn-danger" onclick="cerrarSesion()">Salir</button>
 </div>
</header>

<!-- MAPA -->
<div id="mapaBox">
 <div id="mapa"></div>

 <div id="dashboardMapa">
  <div><strong>Dirección:</strong> <span id="dirTexto">Detectando…</span></div>
  <div><strong>Red:</strong> <span id="netTexto">Detectando…</span></div>
  <div><strong>Velocidad:</strong> <span id="speedTexto">0 km/h</span></div>
 </div>
</div>

<!-- VISOR -->
<div id="viewer" class="viewer">
 <iframe id="frame"></iframe>
</div>

<script>
function toggleHeader(){
 const h=document.querySelector("header");
 if(h.style.display==="none"){
  h.style.display="flex";
  document.documentElement.style.setProperty("--header-h","64px");
 }else{
  h.style.display="none";
  document.documentElement.style.setProperty("--header-h","0px");
 }
}
</script>

<!-- SCRIPTS -->
<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
