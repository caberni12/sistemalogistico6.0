<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ================= VARIABLES ================= */
:root{
 --bg:#f1f5f9;
 --text:#0f172a;
 --muted:#64748b;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
 --header-h:76px;
}

/* ================= RESET ================= */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
html,body{
 margin:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
 overflow:hidden;
}

/* ================= HEADER ================= */
header{
 position:fixed;
 top:0; left:0; right:0;
 height:var(--header-h);
 background:#ffffff;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:8px 14px;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 12px rgba(0,0,0,.08);
 z-index:2000;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:42px;
 height:42px;
 border-radius:12px;
 background:#14b8a6;
 color:#fff;
 font-size:20px;
 border:none;
}

.header-title{
 display:flex;
 flex-direction:column;
 line-height:1.1;
}

#tituloSistema{
 font-size:15px;
 font-weight:700;
 margin:0;
}

.header-info{
 font-size:12px;
 color:var(--muted);
}

.header-right{
 display:flex;
 gap:8px;
}

button{
 border:none;
 border-radius:var(--radius);
 padding:8px 12px;
 font-weight:600;
 cursor:pointer;
}

.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}

/* ================= MENU ================= */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.3s;
 z-index:3000;
 display:flex;
 flex-direction:column;
}
.menu-lateral.open{left:0}

.menu-header{
 padding:16px;
 border-bottom:1px solid var(--border);
 font-weight:700;
 display:flex;
 justify-content:space-between;
}

.menu-items{
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 overflow-y:auto;
}

.menu-item{
 padding:14px;
 border-radius:12px;
 background:#f8fafc;
 font-weight:600;
 cursor:pointer;
}

/* ================= CONTENIDO ================= */
#content{
 position:absolute;
 top:var(--header-h);
 left:0;
 right:0;
 bottom:0;
 background:#ddd;
}

/* ================= MAPA ================= */
#mapa{
 width:100%;
 height:100%;
 z-index:1;
}

/* Leaflet controles: abajo derecha */
.leaflet-top{
 top:auto !important;
 bottom:110px !important;
 right:14px !important;
 left:auto !important;
 z-index:500;
}

/* ================= DASHBOARD ================= */
#dashboardMapa{
 position:absolute;
 bottom:16px;
 left:16px;
 right:16px;
 background:#ffffff;
 border-radius:16px;
 padding:14px;
 font-size:13px;
 box-shadow:0 12px 26px rgba(0,0,0,.25);
 z-index:1000;
}

#dashboardMapa strong{
 display:block;
 margin-bottom:2px;
}

/* ================= VISOR ================= */
#viewer{
 display:none;
 position:absolute;
 inset:0;
 background:#fff;
 z-index:1500;
}

#viewer iframe{
 width:100%;
 height:100%;
 border:none;
}

/* ================= LOADER ================= */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:4000;
}

#progressBar{
 position:fixed;
 top:0; left:0;
 height:3px;
 width:0%;
 background:var(--primary);
 z-index:4001;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
 :root{ --header-h:110px; }

 header{
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
 }

 .header-right{
  width:100%;
  justify-content:space-between;
 }

 #dashboardMapa{
  font-size:12px;
 }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
 <div class="menu-header">
  <span>📦 Panel de Gestión</span>
  <button onclick="toggleMenu()">✕</button>
 </div>
 <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
 <div class="header-left">
  <button id="btnMenu" onclick="toggleMenu()">☰</button>
  <div class="header-title">
   <h1 id="tituloSistema">Panel Logístico</h1>
   <div class="header-info">
    <span id="usuario"></span> · <span id="conexionInfo"></span>
   </div>
  </div>
 </div>

 <div class="header-right">
  <button class="btn-primary" onclick="recargarPanel()">⟳</button>
  <button class="btn-danger" onclick="cerrarSesion()">⏻</button>
 </div>
</header>

<!-- CONTENIDO -->
<div id="content">

 <!-- MAPA -->
 <div id="mapa"></div>

 <!-- DASHBOARD -->
 <div id="dashboardMapa">
  <strong>📍 Dirección</strong>
  <span id="dirTexto">Detectando…</span><br><br>
  <strong>🌐 Red</strong>
  <span id="netTexto">Detectando…</span><br><br>
  <strong>🚀 Velocidad</strong>
  <span id="speedTexto">0 km/h</span>
 </div>

 <!-- VISOR -->
 <div id="viewer">
  <iframe id="frame"></iframe>
 </div>

</div>

<!-- SCRIPTS -->
<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
