<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --border:#e2e8f0;
 --danger:#ef4444;
}

*{ box-sizing:border-box; font-family:system-ui,Arial,sans-serif; }

body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 min-height:100vh;
 display:flex;
 flex-direction:column;
}

/* HEADER */
header{
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:18px 22px;
 background:#ffffff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 12px rgba(0,0,0,.04);
 flex-wrap:wrap;
 gap:12px;
}

header h1{
 margin:0;
 font-size:20px;
 font-weight:700;
}

header .right{
 display:flex;
 gap:14px;
 align-items:center;
 flex-wrap:wrap;
}

header .user{
 font-size:13px;
 color:var(--muted);
 line-height:1.4;
}

header button{
 background:var(--danger);
 color:#fff;
 border:none;
 padding:8px 14px;
 border-radius:8px;
 cursor:pointer;
 font-weight:600;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
 gap:20px;
 padding:28px;
 max-width:1200px;
 margin:auto;
 width:100%;
}

/* CARD */
.card{
 background:var(--card);
 border-radius:18px;
 padding:26px;
 text-align:center;
 cursor:pointer;
 transition:.25s ease;
 border:1px solid var(--border);
 box-shadow:0 6px 18px rgba(0,0,0,.06);
}

.card:hover{
 background:var(--hover);
 transform:translateY(-4px);
 box-shadow:0 10px 28px rgba(0,0,0,.08);
}

.card-icon{ font-size:38px; margin-bottom:12px; }
.card h3{ margin:8px 0 4px; font-size:16px; font-weight:600; }
.card p{ font-size:13px; color:var(--muted); }

/* VIEWER */
.viewer{
 display:none;
 flex-direction:column;
 height:100vh;
 background:#ffffff;
}

.viewer-header{
 background:#ffffff;
 border-bottom:1px solid var(--border);
 padding:12px 16px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 box-shadow:0 4px 12px rgba(0,0,0,.04);
}

.viewer-header span{ font-weight:600; }

.viewer-header button{
 background:var(--accent);
 border:none;
 padding:8px 14px;
 border-radius:8px;
 cursor:pointer;
 color:#fff;
 font-weight:600;
}

.viewer iframe{
 flex:1;
 border:none;
 width:100%;
}

/* MOBILE */
@media (max-width:768px){
  header{
    flex-direction:column;
    align-items:flex-start;
  }
  header h1{ font-size:18px; }
  header .right{
    width:100%;
    flex-direction:column;
    align-items:flex-start;
  }
  header button{
    width:100%;
    padding:14px;
    border-radius:12px;
  }
}

/* ======================
   LOADER PROGRESO
====================== */
#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#14b8a6);
  z-index:9999;
  transition:width .25s ease;
  box-shadow:0 0 10px rgba(20,184,166,.6);
}

/* ======================
   BARRA + OVERLAY
====================== */
#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#14b8a6);
  z-index:9999;
  display:none;
}

#loadingOverlay{
  position:fixed;
  inset:0;
  background:rgba(241,245,249,.95);
  backdrop-filter:blur(4px);
  z-index:9998;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:18px;
}

#loadingOverlay span{
  font-size:14px;
  font-weight:600;
  color:#334155;
}

.card.active{
  outline:2px solid #14b8a6;
  background:#f0fdfa;
}
</style>
</head>

<body>

<div id="progressBar"></div>

<div id="loadingOverlay">
  <span id="loadingText">Iniciando sistema…</span>
</div>

<header>
  <h1>🚀 Sistema de Gestión Logística AS</h1>
  <div class="right">
    <div id="usuario" class="user"></div>
    <div id="conexionInfo" class="user"></div>

    <button id="btnRecargar" onclick="recargarPanel()" style="background:#3b82f6;">
      ⟳ Recargar
    </button>

    <button onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>
</header>

<!-- PANEL -->
<div id="panel" class="grid"></div>

<!-- VISOR -->
<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- ===================== JS ===================== -->

<script src="auth.js"></script>

<script src="main.js"></script>


<script src="segurity.js"></script>

</body>
</html>
