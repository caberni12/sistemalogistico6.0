<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ================= VARIABLES ================= */
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
 --header-h:72px;
}

/* ================= RESET ================= */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
html,body{
 margin:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* ================= BOTONES ================= */
button{
 border:none;
 border-radius:var(--radius);
 padding:10px 14px;
 font-weight:600;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 gap:6px;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--border)}

/* ================= HEADER (GLOBAL) ================= */
header{
 position:fixed;
 top:0;
 left:0;
 right:0;
 height:var(--header-h);
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 16px;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 z-index:1000;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:40px;
 height:40px;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 font-size:20px;
}

#btnVolver{
 display:none;
}

header h1{
 margin:0;
 font-size:16px;
 font-weight:700;
}

.header-info{
 font-size:12px;
 color:var(--muted);
 line-height:1.2;
}

.header-right{
 display:flex;
 gap:10px;
}

/* ================= MENU LATERAL ================= */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.3s;
 z-index:1500;
 display:flex;
 flex-direction:column;
}
.menu-lateral.open{left:0}

.menu-header{
 padding:16px;
 border-bottom:1px solid var(--border);
 font-weight:700;
 display:flex;
 justify-content:space-between;
}
.menu-items{
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 overflow-y:auto;
}
.menu-item{
 padding:14px;
 border-radius:12px;
 background:var(--hover);
 font-weight:600;
 cursor:pointer;
}

/* ================= CONTENIDO ================= */
#content{
 position:relative;
 margin-top:var(--header-h);
 height:calc(100vh - var(--header-h));
}

/* ================= MAPA ================= */
#mapa{
 width:100%;
 height:100%;
}

/* Controles Leaflet abajo derecha */
.leaflet-top{
 top:auto !important;
 bottom:90px !important;
 right:12px !important;
 left:auto !important;
}

/* ================= DASHBOARD MAPA ================= */
#dashboardMapa{
 position:absolute;
 bottom:16px;
 left:16px;
 right:16px;
 background:#fff;
 border-radius:16px;
 padding:14px;
 font-size:12px;
 box-shadow:0 10px 24px rgba(0,0,0,.22);
 z-index:500;
}

/* ================= VISOR DE MÓDULOS ================= */
#viewer{
 display:none;
 position:absolute;
 inset:0;
 background:#fff;
 z-index:800;
}
#viewer iframe{
 width:100%;
 height:100%;
 border:none;
}

/* ================= LOADER ================= */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.9);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:2000;
}
#progressBar{
 position:fixed;
 top:0;
 left:0;
 height:3px;
 width:0%;
 background:var(--primary);
 z-index:2001;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
 header{
  flex-direction:column;
  align-items:flex-start;
  height:auto;
  padding:8px 16px;
 }
 :root{ --header-h:120px; }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
 <div class="menu-header">
  <span>📦 Panel de Gestión</span>
  <button class="btn-ghost" onclick="toggleMenu()">✕</button>
 </div>
 <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
 <div class="header-left">
  <button id="btnMenu" onclick="toggleMenu()">☰</button>
  <button id="btnVolver" class="btn-ghost" onclick="volver()">⬅</button>
  <h1 id="tituloSistema">Panel Logístico</h1>
 </div>

 <div class="header-info">
  <div id="usuario"></div>
  <div id="conexionInfo"></div>
 </div>

 <div class="header-right">
  <button class="btn-primary" onclick="recargarPanel()">⟳</button>
  <button class="btn-danger" onclick="cerrarSesion()">⏻</button>
 </div>
</header>

<!-- CONTENIDO -->
<div id="content">

 <!-- MAPA -->
 <div id="mapa"></div>

 <!-- DASHBOARD -->
 <div id="dashboardMapa">
  <div><strong>📍 Dirección:</strong> <span id="dirTexto">Detectando…</span></div>
  <div><strong>🌐 Red:</strong> <span id="netTexto">Detectando…</span></div>
  <div><strong>🚀 Velocidad:</strong> <span id="speedTexto">0 km/h</span></div>
 </div>

 <!-- VISOR -->
 <div id="viewer">
  <iframe id="frame"></iframe>
 </div>

</div>

<!-- SCRIPTS -->
<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
